name: AC Audit

on:
  pull_request:
  push:
    branches: [master, main]

jobs:
  audit:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check test AC traceability
        run: |
          python3 - <<'EOF'
          import ast, glob, sys, json

          missing_ac = []
          trivial = []

          for f in glob.glob('tests/**/*.py', recursive=True):
              try:
                  tree = ast.parse(open(f).read())
              except:
                  continue
              for node in ast.walk(tree):
                  if not isinstance(node, ast.FunctionDef):
                      continue
                  if not node.name.startswith('test_'):
                      continue
                  if 'AC' not in node.name and 'REQ' not in node.name:
                      missing_ac.append(f'{f}::{node.name}')
                  stmts = [s for s in node.body if not isinstance(s, ast.Expr)]
                  if len(node.body) <= 2:
                      for stmt in ast.walk(node):
                          if isinstance(stmt, ast.Assert):
                              if isinstance(stmt.test, ast.Constant) and stmt.test.value is True:
                                  trivial.append(f'{f}::{node.name}')

          report = {'missing_ac_reference': missing_ac, 'trivial_tests': trivial}
          with open('ac-audit-report.json', 'w') as fp:
              json.dump(report, fp, indent=2)

          print(f"Tests missing AC reference: {len(missing_ac)}")
          print(f"Trivial tests: {len(trivial)}")

          if missing_ac:
              print("\nMissing AC reference:")
              for m in missing_ac[:20]:
                  print(f"  {m}")

          if trivial:
              print("\nTrivial tests:")
              for t in trivial:
                  print(f"  {t}")

          if trivial:
              sys.exit(1)
          EOF

      # W2: fetch linked issue body and audit AC format (GIVEN/THEN)
      - name: Audit GitHub issue ACs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 - <<'EOF'
          import subprocess, re, json, sys

          # Extract issue number from PR body
          result = subprocess.run(
              ['gh', 'pr', 'view', '--json', 'body,number'],
              capture_output=True, text=True
          )
          if result.returncode != 0:
              print("Could not fetch PR body -- skipping issue AC audit")
              with open('issue-ac-audit.json', 'w') as f:
                  json.dump({'skipped': True, 'reason': 'could not fetch PR'}, f)
              sys.exit(0)

          pr_data = json.loads(result.stdout)
          pr_body = pr_data.get('body', '')

          issue_match = re.search(r'[Cc]loses?\s+#(\d+)', pr_body)
          if not issue_match:
              print("No linked issue found in PR body (Closes #N required)")
              with open('issue-ac-audit.json', 'w') as f:
                  json.dump({'skipped': False, 'error': 'no linked issue', 'verdict': 'FAIL'}, f, indent=2)
              sys.exit(1)

          issue_num = issue_match.group(1)
          result2 = subprocess.run(
              ['gh', 'issue', 'view', issue_num, '--json', 'title,body'],
              capture_output=True, text=True
          )
          if result2.returncode != 0:
              print(f"Could not fetch issue #{issue_num}")
              with open('issue-ac-audit.json', 'w') as f:
                  json.dump({'skipped': True, 'reason': f'could not fetch issue {issue_num}'}, f)
              sys.exit(0)

          issue = json.loads(result2.stdout)
          issue_body = issue.get('body', '')

          # Check for GIVEN/THEN format in ACs
          has_given = bool(re.search(r'\bGIVEN\b', issue_body, re.IGNORECASE))
          has_then  = bool(re.search(r'\bTHEN\b',  issue_body, re.IGNORECASE))
          ac_count  = len(re.findall(r'\bAC\d+\b', issue_body))

          problems = []
          if not has_given:
              problems.append("No GIVEN keyword found in issue body")
          if not has_then:
              problems.append("No THEN keyword found in issue body")
          if ac_count == 0:
              problems.append("No AC1/AC2/... labels found in issue body")

          verdict = 'PASS' if not problems else 'FAIL'
          report = {
              'issue': issue_num,
              'title': issue.get('title', ''),
              'has_given': has_given,
              'has_then': has_then,
              'ac_count': ac_count,
              'problems': problems,
              'verdict': verdict
          }

          with open('issue-ac-audit.json', 'w') as f:
              json.dump(report, f, indent=2)

          print(f"Issue #{issue_num}: {verdict}")
          for p in problems:
              print(f"  PROBLEM: {p}")

          if verdict == 'FAIL':
              sys.exit(1)
          EOF

      # W3+W4: Claude API audit with full context — spec + issue body + design + test stubs — posts as PR comment
      - name: Claude AC audit
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 - <<'EOF'
          import os, json, glob, subprocess, anthropic

          api_key = os.environ.get('ANTHROPIC_API_KEY')
          if not api_key:
              print("ANTHROPIC_API_KEY not set -- skipping Claude audit")
              exit(0)

          # Collect test files changed in this PR
          result = subprocess.run(
              ['git', 'diff', '--name-only', 'origin/master...HEAD'],
              capture_output=True, text=True
          )
          changed_tests = [f for f in result.stdout.strip().split('\n') if f.startswith('tests/')]

          # W3: also collect spec, design, arch docs from .boss/
          spec_content = ""
          for doc_path in ['.boss/spec.md', '.boss/parsed-requirement.md', '.boss/research.md', 'docs/architecture.md']:
              if os.path.exists(doc_path):
                  spec_content += f"\n\n### {doc_path}\n{open(doc_path).read()}"

          # W3: fetch linked issue body
          issue_body_content = ""
          if os.path.exists('issue-ac-audit.json'):
              audit_data = json.load(open('issue-ac-audit.json'))
              issue_num = audit_data.get('issue')
              if issue_num:
                  r = subprocess.run(
                      ['gh', 'issue', 'view', str(issue_num), '--json', 'title,body'],
                      capture_output=True, text=True
                  )
                  if r.returncode == 0:
                      iss = json.loads(r.stdout)
                      issue_body_content = f"### GitHub Issue #{issue_num}: {iss.get('title','')}\n{iss.get('body','')}"

          if not changed_tests and not spec_content and not issue_body_content:
              print("No test files changed and no spec/issue found -- skipping Claude audit")
              with open('claude-audit-report.md', 'w') as f:
                  f.write("# Claude AC Audit\n\nNo changed tests or spec docs found in this PR.\n")
              exit(0)

          # Read changed test files
          test_content = ""
          for f in changed_tests[:5]:
              if os.path.exists(f):
                  test_content += f"\n\n### {f}\n```python\n{open(f).read()}\n```"

          # Read ac-audit-report.json
          ac_audit = {}
          if os.path.exists('ac-audit-report.json'):
              ac_audit = json.load(open('ac-audit-report.json'))

          prompt = f"""You are an independent QA auditor. You have NO knowledge of how these tests or specs were written.

Audit against these criteria:

1. Do the test stubs map 1:1 to the ACs in the issue? Is there a test for every AC fire case AND anti-case?
2. Does each test function test ONE specific condition?
3. Does each test have a meaningful assertion (not assert True or type check)?
4. For fire-case tests: does the setup actually match the GIVEN conditions?
5. For anti-case tests: does it actually violate the specific condition it claims to test?
6. Are fixture values realistic (real price levels, real RSI ranges, real volumes)?
7. Does the spec have enough detail that an engineer could implement without asking questions?

---

## Linked Issue / Requirements
{issue_body_content if issue_body_content else '(no linked issue found)'}

---

## Spec / Design Docs
{spec_content if spec_content else '(no .boss/ spec docs found)'}

---

## AC Traceability Report
Tests missing AC reference: {ac_audit.get('missing_ac_reference', [])}
Trivial tests: {ac_audit.get('trivial_tests', [])}

---

## Changed Test Files
{test_content if test_content else '(no changed test files)'}

---

Output a markdown report:
- Overall verdict: PASS / FAIL / NEEDS REVIEW
- Requirements quality: is the spec testable? are ACs in GIVEN/THEN format?
- For each test file: findings (function name + specific issue)
- Count: real tests vs questionable tests
- Recommendation: what reviewer must manually verify

Be harsh. Trading system. Fake tests cost money."""

          client = anthropic.Anthropic(api_key=api_key)
          message = client.messages.create(
              model="claude-sonnet-4-6",
              max_tokens=2000,
              messages=[{"role": "user", "content": prompt}]
          )

          report = message.content[0].text
          pr_ref = os.environ.get('GITHUB_REF', 'unknown')

          full_report = f"# Claude AC Audit Report\n\n**PR:** {pr_ref}\n\n{report}"

          with open('claude-audit-report.md', 'w') as f:
              f.write(full_report)

          print(report)

          # W4: post as PR comment
          pr_num_match = __import__('re').search(r'refs/pull/(\d+)', pr_ref)
          if pr_num_match:
              pr_num = pr_num_match.group(1)
              comment_body = f"## Claude AC Audit\n\n{report}\n\n---\n*Posted by ac-audit.yml — model: claude-sonnet-4-6*"
              subprocess.run(
                  ['gh', 'pr', 'comment', pr_num, '--body', comment_body],
                  capture_output=True, text=True
              )
              print(f"Posted audit as comment on PR #{pr_num}")
          EOF

      - name: Upload audit artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ac-audit-${{ github.sha }}
          path: |
            ac-audit-report.json
            issue-ac-audit.json
            claude-audit-report.md

  # ── Gap 1+2: verify red phase + post step trigger comment ──────────────────
  verify-red-phase:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      pull-requests: write
      issues: write
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync --all-extras
        env:
          DATABASE_URL: sqlite+aiosqlite:///./data/test.db
          SUPABASE_URL: https://placeholder.supabase.co
          SUPABASE_SECRET_KEY: placeholder-secret
          ALPHA_VANTAGE_KEY: placeholder
          FINNHUB_KEY: placeholder
          ANTHROPIC_API_KEY: placeholder

      - name: Detect phase and verify
        id: phase
        env:
          DATABASE_URL: sqlite+aiosqlite:///./data/test.db
          SUPABASE_URL: https://placeholder.supabase.co
          SUPABASE_SECRET_KEY: placeholder-secret
          ALPHA_VANTAGE_KEY: placeholder
          FINNHUB_KEY: placeholder
          ANTHROPIC_API_KEY: placeholder
        run: |
          # New test files added in this PR (not in base branch)
          NEW_TESTS=$(git diff --name-only origin/${{ github.base_ref }}...HEAD \
            --diff-filter=A | grep -E '^tests/.*\.py$' || true)

          # New src files added/modified in this PR
          CHANGED_SRC=$(git diff --name-only origin/${{ github.base_ref }}...HEAD \
            | grep -E '^src/' || true)

          echo "new_tests=$NEW_TESTS"
          echo "changed_src=$CHANGED_SRC"

          if [ -n "$CHANGED_SRC" ] && [ -n "$NEW_TESTS" ]; then
            echo "phase=green" >> $GITHUB_OUTPUT
            echo "PHASE: green (src/ + tests/ both changed)"

            # Green phase: all tests must pass
            uv run pytest -q --tb=short --no-header --ignore=tests/integration --ignore=tests/ui
            if [ $? -ne 0 ]; then
              echo "verdict=FAIL" >> $GITHUB_OUTPUT
              echo "reason=Green phase: tests must all pass when src/ is changed" >> $GITHUB_OUTPUT
              exit 1
            fi
            echo "verdict=PASS" >> $GITHUB_OUTPUT
            echo "reason=Green phase: all tests pass" >> $GITHUB_OUTPUT

          elif [ -z "$CHANGED_SRC" ] && [ -n "$NEW_TESTS" ]; then
            echo "phase=red" >> $GITHUB_OUTPUT
            echo "PHASE: red (only tests/ added, no src/ changes)"

            # Red phase: existing tests pass, new stubs fail
            IGNORE_ARGS=""
            for f in $NEW_TESTS; do
              IGNORE_ARGS="$IGNORE_ARGS --ignore=$f"
            done

            echo "--- Regression check (excluding new stubs) ---"
            uv run pytest -q --tb=short --no-header --ignore=tests/integration --ignore=tests/ui $IGNORE_ARGS
            if [ $? -ne 0 ]; then
              echo "verdict=FAIL" >> $GITHUB_OUTPUT
              echo "reason=Red phase: existing tests regressed" >> $GITHUB_OUTPUT
              exit 1
            fi

            echo "--- Stub verification (must FAIL) ---"
            uv run pytest -q --tb=line --no-header $NEW_TESTS 2>&1 || STUB_FAILED=true
            if [ -z "$STUB_FAILED" ]; then
              echo "verdict=FAIL" >> $GITHUB_OUTPUT
              echo "reason=Red phase: stubs passed — implementation should not exist yet" >> $GITHUB_OUTPUT
              exit 1
            fi

            echo "verdict=PASS" >> $GITHUB_OUTPUT
            echo "reason=Red phase verified: no regressions + stubs correctly fail" >> $GITHUB_OUTPUT

          else
            echo "phase=docs" >> $GITHUB_OUTPUT
            echo "verdict=SKIP" >> $GITHUB_OUTPUT
            echo "reason=No new test files or src/ changes in this PR" >> $GITHUB_OUTPUT
          fi

      - name: Label PR with phase
        if: steps.phase.outputs.verdict == 'PASS' && steps.phase.outputs.phase != 'docs'
        run: |
          PHASE="${{ steps.phase.outputs.phase }}"
          PR="${{ github.event.pull_request.number }}"
          BRANCH="${{ github.head_ref }}"

          # Remove old phase labels first
          gh pr edit $PR --remove-label "phase:red" 2>/dev/null || true
          gh pr edit $PR --remove-label "phase:green" 2>/dev/null || true
          # Add current phase label (create if missing)
          gh label create "phase:$PHASE" --color "0075ca" 2>/dev/null || true
          gh pr edit $PR --add-label "phase:$PHASE"
          echo "Labeled PR with phase:$PHASE"

          # Red phase: set gate:awaiting-step21 (blocks implementation until human approves)
          # Human removes this label at step 21 to unblock src/ edits.
          # fix/ branches are exempt (lightweight path, no spec/stub phases).
          if [ "$PHASE" = "red" ] && [[ "$BRANCH" != fix/* ]]; then
            gh label create "gate:awaiting-step21" --color "e4e669" 2>/dev/null || true
            gh pr edit $PR --add-label "gate:awaiting-step21"
            echo "Set gate:awaiting-step21 — implementation blocked until human step 21 approval"
          fi

          # Green phase: remove gate:awaiting-step21 if still present (shouldn't be, but clean up)
          if [ "$PHASE" = "green" ]; then
            gh pr edit $PR --remove-label "gate:awaiting-step21" 2>/dev/null || true
          fi

      - name: Post step-trigger comment
        if: steps.phase.outputs.verdict == 'PASS'
        run: |
          PHASE="${{ steps.phase.outputs.phase }}"
          PR="${{ github.event.pull_request.number }}"
          BRANCH="${{ github.head_ref }}"
          SHA="${{ github.sha }}"

          if [ "$PHASE" = "red" ]; then
            NEXT_STEP="13"
            NEXT_ACTION="Write design review doc (.boss/design-review.md) — architecture review, implementation checklist, gaps."
            HUMAN_ACTION="**No action needed.** Claude can continue to step 13 automatically in next turn.\n\n> **Implementation is blocked** by \`gate:awaiting-step21\` label. Remove this label at step 21 after reviewing the CI audit report."
          elif [ "$PHASE" = "green" ]; then
            NEXT_STEP="27"
            NEXT_ACTION="Review CI results and approve PR if everything looks good."
            HUMAN_ACTION="**Manual gate.** Review this PR, check CI badges, then approve and merge."
          else
            NEXT_STEP="?"
            NEXT_ACTION="No test changes detected."
            HUMAN_ACTION="No action needed."
          fi

          BODY="## ✅ Phase Verification — \`phase:$PHASE\` confirmed

          **Reason:** ${{ steps.phase.outputs.reason }}
          **Branch:** \`$BRANCH\`
          **Commit:** \`${SHA:0:8}\`

          ---

          ### ➡️ Next Step: Step $NEXT_STEP

          $NEXT_ACTION

          $HUMAN_ACTION

          ---
          *Posted by \`verify-red-phase\` job — external trigger for step sequencing.*"

          gh pr comment $PR --body "$BODY"
