name: Test Suite

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run tests with coverage
        env:
          DATABASE_URL: sqlite+aiosqlite:///./data/test.db
          SUPABASE_URL: https://placeholder.supabase.co
          SUPABASE_SECRET_KEY: placeholder-secret
          ALPHA_VANTAGE_KEY: placeholder
          FINNHUB_KEY: placeholder
          ANTHROPIC_API_KEY: placeholder
        run: uv run pytest -q --tb=short --no-header --junitxml=results/junit.xml --cov=src --cov-fail-under=75 --cov-report=term-missing:skip-covered --ignore=tests/integration

      - name: Check no trivial tests
        run: |
          if grep -r "^\s*assert True\s*$\|^\s*pass\s*$" tests/ --include="*.py" -l; then
            echo "FAIL: trivial tests found (assert True / pass-only test bodies)"
            exit 1
          fi
          echo "OK: no trivial tests found"

      - name: Install Playwright
        run: |
          npm ci
          npx playwright install chromium --with-deps

      - name: Start server
        run: uv run eigenview serve &
        env:
          DATABASE_URL: sqlite+aiosqlite:///./data/test.db
          SUPABASE_URL: https://placeholder.supabase.co
          SUPABASE_SECRET_KEY: placeholder-secret
          ALPHA_VANTAGE_KEY: placeholder
          FINNHUB_KEY: placeholder
          ANTHROPIC_API_KEY: placeholder

      - name: Wait for server
        run: npx wait-on http://localhost:8000 --timeout 30000

      - name: Run Playwright UI tests
        run: npx playwright test tests/ui/ --reporter=line

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ github.sha }}
          path: |
            results/
            playwright-report/
            test-results/
