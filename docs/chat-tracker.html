<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EigenView — Chat Ask Tracker</title>
<style>
  :root {
    --bg:#010408; --surface:#080e18; --surface2:#0c1420; --surface3:#101928;
    --border:#152030; --border2:#1e2d40;
    --text:#e8f0ff; --text2:#ccd8f0; --text3:#a0b8d8;
    --G:#00ff99; --R:#ff2d55; --B:#00b4ff; --Y:#ffd60a;
    --P:#bf5fff; --O:#ff6b00; --T:#00e5cc;
    --accent:#7c6dfa;
    --done-bg:rgba(0,255,153,0.08); --done-border:rgba(0,255,153,0.2);
    --progress-bg:rgba(255,214,10,0.08); --progress-border:rgba(255,214,10,0.25);
    --open-bg:rgba(255,45,85,0.08); --open-border:rgba(255,45,85,0.25);
    --partial-bg:rgba(191,95,255,0.08); --partial-border:rgba(191,95,255,0.25);
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;font-size:13px;line-height:1.5;}

  header{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 24px;position:sticky;top:0;z-index:100;}
  .hrow{display:flex;align-items:center;gap:20px;flex-wrap:wrap;}
  h1{font-size:15px;font-weight:800;letter-spacing:0.5px;}
  h1 span{color:var(--accent);}
  .meta{font-size:11px;color:var(--text3);}
  .meta strong{color:var(--text2);}
  .stats{display:flex;gap:8px;margin-left:auto;}
  .stat{background:var(--surface2);border:1px solid var(--border2);border-radius:6px;padding:4px 12px;text-align:center;}
  .stat-val{font-size:16px;font-weight:800;display:block;}
  .stat-lbl{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:0.4px;}
  .sv-done{color:var(--G);}
  .sv-prog{color:var(--Y);}
  .sv-open{color:var(--R);}
  .sv-part{color:var(--P);}

  /* TAB NAV */
  .tab-nav{display:flex;gap:8px;padding:10px 24px;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:59px;z-index:99;flex-wrap:wrap;align-items:center;}
  .tab-btn{padding:5px 18px;border-radius:20px;border:1px solid var(--border2);background:var(--surface2);color:var(--text3);font-size:12px;font-weight:700;cursor:pointer;transition:all .15s;}
  .tab-btn:hover{border-color:var(--accent);color:var(--text);}
  .tab-btn.active{background:var(--accent);border-color:var(--accent);color:#fff;}
  .tab-panel{display:none;}
  .tab-panel.active{display:block;}

  /* ISSUES TOOLBAR */
  .toolbar{display:flex;gap:8px;padding:10px 24px 10px;flex-wrap:wrap;align-items:center;}
  select,input[type=text]{background:var(--surface2);border:1px solid var(--border2);color:var(--text);padding:5px 10px;border-radius:5px;font-size:12px;outline:none;}
  select:focus,input:focus{border-color:var(--accent);}

  main{padding:16px 24px;}

  /* SESSION SECTIONS */
  .session{margin-bottom:20px;}
  .session-hdr{background:var(--surface2);border:1px solid var(--border2);border-radius:8px 8px 0 0;padding:10px 16px;display:flex;align-items:center;gap:12px;cursor:pointer;}
  .session-hdr:hover{background:var(--surface3);}
  .session-date{font-weight:800;font-size:13px;color:var(--text);}
  .session-count{font-size:11px;color:var(--text3);}
  .session-body{border:1px solid var(--border2);border-top:none;border-radius:0 0 8px 8px;overflow:hidden;}

  /* TABLE */
  table{width:100%;border-collapse:collapse;}
  thead{background:var(--surface);}
  th{padding:7px 10px;text-align:left;font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:0.5px;border-bottom:1px solid var(--border2);white-space:nowrap;}
  td{padding:8px 10px;border-bottom:1px solid var(--border);vertical-align:top;}
  tr:last-child td{border-bottom:none;}
  tr:hover td{background:rgba(124,109,250,0.04);}

  .col-num{width:42px;min-width:42px;font-family:'Courier New',monospace;font-size:11px;color:var(--text3);}
  .col-src{width:70px;min-width:70px;}
  .col-ask{min-width:280px;}
  .col-status{width:100px;min-width:100px;}
  .col-resp{min-width:200px;color:var(--text2);font-size:11px;}

  .ask-title{font-size:12px;font-weight:600;color:var(--text);line-height:1.4;}
  .ask-detail{font-size:11px;color:var(--text3);margin-top:2px;line-height:1.4;}

  /* SOURCE BADGES */
  .src-user{display:inline-flex;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:800;
    background:rgba(0,180,255,0.12);color:var(--B);border:1px solid rgba(0,180,255,0.3);}
  .src-claude{display:inline-flex;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:800;
    background:rgba(124,109,250,0.12);color:var(--accent);border:1px solid rgba(124,109,250,0.3);}

  /* STATUS BADGES */
  .st{display:inline-flex;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:800;letter-spacing:0.3px;white-space:nowrap;}
  .st-done{background:var(--done-bg);color:var(--G);border:1px solid var(--done-border);}
  .st-prog{background:var(--progress-bg);color:var(--Y);border:1px solid var(--progress-border);}
  .st-open{background:var(--open-bg);color:var(--R);border:1px solid var(--open-border);}
  .st-partial{background:var(--partial-bg);color:var(--P);border:1px solid var(--partial-border);}

  /* PRIORITY */
  .pri{display:inline-flex;padding:2px 6px;border-radius:4px;font-size:10px;font-weight:800;margin-left:6px;}
  .p0{background:rgba(255,45,85,0.15);color:var(--R);}
  .p1{background:rgba(255,107,0,0.15);color:var(--O);}
  .p2{background:rgba(255,214,10,0.12);color:var(--Y);}
  .p3{background:rgba(0,180,255,0.12);color:var(--B);}

  .resp-file{font-family:'Courier New',monospace;font-size:10px;background:var(--surface2);padding:1px 5px;border-radius:3px;color:var(--T);}

  .item-row.hidden{display:none;}
  .last-updated{font-size:11px;color:var(--text3);padding:8px 24px;text-align:right;}

  /* ── CAPTURES TAB ─────────────────────────────────────────────────────── */
  .cap-panel{padding:16px 24px;}
  .cap-grid{display:flex;flex-direction:column;gap:12px;}

  .capture-card{background:var(--surface);border:1px solid var(--border2);border-radius:8px;overflow:hidden;}
  .capture-card-hdr{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--surface2);border-bottom:1px solid var(--border);}
  .cap-num{font-family:'Courier New',monospace;font-size:12px;font-weight:800;color:var(--T);min-width:28px;}
  .cap-title{font-size:12px;font-weight:700;color:var(--text);flex:1;}
  .cap-ts{font-size:10px;color:var(--text3);}
  .cap-author-claude{display:inline-flex;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:800;
    background:rgba(124,109,250,0.12);color:var(--accent);border:1px solid rgba(124,109,250,0.3);}
  .cap-author-user{display:inline-flex;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:800;
    background:rgba(0,180,255,0.12);color:var(--B);border:1px solid rgba(0,180,255,0.3);}
  .cap-type{display:inline-flex;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:700;
    background:var(--surface3);color:var(--text3);border:1px solid var(--border2);}
  .cap-issues{display:flex;gap:4px;flex-wrap:wrap;margin-left:4px;}
  .cap-issue-link{font-size:10px;font-weight:700;color:var(--Y);background:rgba(255,214,10,0.1);
    border:1px solid rgba(255,214,10,0.25);border-radius:4px;padding:1px 6px;cursor:pointer;text-decoration:none;}
  .cap-issue-link:hover{background:rgba(255,214,10,0.2);}
  .capture-card-body{padding:14px;}
  .cap-text{font-size:12px;color:var(--text2);white-space:pre-wrap;line-height:1.6;}
  .cap-image{max-width:100%;border-radius:4px;border:1px solid var(--border2);}
  .cap-table{width:100%;border-collapse:collapse;font-size:11px;}
  .cap-table th{background:var(--surface2);color:var(--text3);padding:5px 8px;text-align:left;border:1px solid var(--border2);font-size:10px;text-transform:uppercase;letter-spacing:0.3px;}
  .cap-table td{padding:5px 8px;border:1px solid var(--border);color:var(--text2);}
  .cap-table tr:nth-child(even) td{background:rgba(255,255,255,0.01);}

  /* DELETE btn */
  .cap-del{background:none;border:none;color:var(--text3);font-size:14px;cursor:pointer;padding:2px 6px;border-radius:4px;margin-left:auto;}
  .cap-del:hover{color:var(--R);background:rgba(255,45,85,0.1);}

  /* PASTE AREA */
  .paste-section{margin-bottom:16px;}
  .paste-hdr{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px;font-weight:700;}
  .paste-form{background:var(--surface);border:1px solid var(--border2);border-radius:8px;overflow:hidden;}
  .paste-fields{display:flex;gap:8px;padding:10px 14px;background:var(--surface2);border-bottom:1px solid var(--border);}
  .paste-title-input{flex:1;background:var(--surface3);border:1px solid var(--border2);color:var(--text);padding:5px 10px;border-radius:5px;font-size:12px;outline:none;}
  .paste-title-input:focus{border-color:var(--accent);}
  .paste-issue-input{width:110px;background:var(--surface3);border:1px solid var(--border2);color:var(--Y);padding:5px 10px;border-radius:5px;font-size:12px;outline:none;}
  .paste-issue-input:focus{border-color:var(--Y);}
  .paste-issue-input::placeholder{color:var(--text3);}
  .paste-zone{min-height:80px;padding:14px;color:var(--text3);font-size:12px;outline:none;position:relative;cursor:text;}
  .paste-zone:focus{color:var(--text);}
  .paste-zone-hint{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:var(--text3);font-size:12px;pointer-events:none;text-align:center;white-space:nowrap;}
  .paste-zone-hint span{display:block;font-size:18px;margin-bottom:4px;opacity:0.4;}
  .paste-zone img{max-width:100%;border-radius:4px;}
  .paste-actions{display:flex;gap:8px;padding:8px 14px;border-top:1px solid var(--border);}
  .paste-save-btn{padding:5px 16px;background:var(--accent);border:none;border-radius:5px;color:#fff;font-size:12px;font-weight:700;cursor:pointer;}
  .paste-save-btn:hover{opacity:0.85;}
  .paste-clear-btn{padding:5px 12px;background:var(--surface2);border:1px solid var(--border2);border-radius:5px;color:var(--text3);font-size:12px;cursor:pointer;}
  .paste-clear-btn:hover{border-color:var(--R);color:var(--R);}

  /* Cap counter badge */
  .cap-count-badge{font-size:11px;color:var(--T);background:rgba(0,229,204,0.1);border:1px solid rgba(0,229,204,0.2);border-radius:10px;padding:2px 8px;margin-left:8px;}
</style>
</head>
<body>

<header>
  <div class="hrow">
    <h1>Eigen<span>View</span> — <span style="color:var(--T)">Chat Ask Tracker</span></h1>
    <div class="meta">Updated: <strong id="last-updated">2026-05-08</strong></div>
    <div class="stats">
      <div class="stat"><span class="stat-val sv-done" id="cnt-done">0</span><span class="stat-lbl">Done</span></div>
      <div class="stat"><span class="stat-val sv-prog" id="cnt-prog">0</span><span class="stat-lbl">In Progress</span></div>
      <div class="stat"><span class="stat-val sv-part" id="cnt-part">0</span><span class="stat-lbl">Partial</span></div>
      <div class="stat"><span class="stat-val sv-open" id="cnt-open">0</span><span class="stat-lbl">Open</span></div>
    </div>
  </div>
</header>

<div class="tab-nav">
  <button class="tab-btn active" onclick="switchTab('issues',this)">Issues</button>
  <button class="tab-btn" onclick="switchTab('captures',this)">Captures <span class="cap-count-badge" id="cap-count-badge">0</span></button>
</div>

<!-- ── ISSUES TAB ──────────────────────────────────────────────────────────── -->
<div id="tab-issues" class="tab-panel active">
  <div class="toolbar">
    <select id="filter-src">
      <option value="">All Sources</option>
      <option value="user">User Asks</option>
      <option value="claude">Claude Identified</option>
    </select>
    <select id="filter-status">
      <option value="">All Status</option>
      <option value="done">Done</option>
      <option value="prog">In Progress</option>
      <option value="partial">Partial</option>
      <option value="open">Open</option>
    </select>
    <select id="filter-pri">
      <option value="">All Priorities</option>
      <option value="p0">P0 — Critical</option>
      <option value="p1">P1 — Core</option>
      <option value="p2">P2 — Enhancement</option>
      <option value="p3">P3 — Nice to Have</option>
    </select>
    <input type="text" id="filter-search" placeholder="Search asks..." style="min-width:200px;">
  </div>
  <main id="main-content"></main>
  <div class="last-updated">Last updated: 2026-05-08 · Updated by Claude each conversation turn</div>
</div>

<!-- ── CAPTURES TAB ────────────────────────────────────────────────────────── -->
<div id="tab-captures" class="tab-panel">
  <div class="cap-panel">

    <!-- PASTE AREA -->
    <div class="paste-section">
      <div class="paste-hdr">New Capture — paste text or image below</div>
      <div class="paste-form">
        <div class="paste-fields">
          <input type="text" class="paste-title-input" id="paste-title" placeholder="Title (optional)">
          <input type="text" class="paste-issue-input" id="paste-issues" placeholder="Issues: #16 #28">
        </div>
        <div class="paste-zone" id="paste-zone" contenteditable="true" tabindex="0">
          <div class="paste-zone-hint" id="paste-hint"><span>⌘V</span>Paste text, image, or table here</div>
        </div>
        <div class="paste-actions">
          <button class="paste-save-btn" onclick="saveCapture()">Save Capture</button>
          <button class="paste-clear-btn" onclick="clearPasteZone()">Clear</button>
        </div>
      </div>
    </div>

    <!-- CAPTURES LIST -->
    <div class="cap-grid" id="captures-list"></div>

  </div>
</div>

<script>
// ─────────────────────────────────────────────────────────────────────────────
// ISSUES DATA
// ─────────────────────────────────────────────────────────────────────────────
const SESSIONS = [

{
  date: "2026-05-07 (prev session)",
  items: [
    {id:1, src:"user", pri:"p0", status:"done",
     ask:"Why did CI not run the Claude zero-context audit?",
     detail:"Full honest accounting requested — what exactly happened with the audit step.",
     resp:"Two bugs: (1) YAML syntax error — Python f-string with numbered list at col 0 broke block scalar. (2) import anthropic before API key check + no pip install anthropic in audit job. Both fixed in b43e881."},

// ─────────────────────────────────────────────────────────────────────────────
// ISSUES RENDER
// ─────────────────────────────────────────────────────────────────────────────
function statusBadge(st) {
  const map = {done:'st-done',prog:'st-prog',partial:'st-partial',open:'st-open'};
  const label = {done:'✓ Done',prog:'⟳ In Progress',partial:'◑ Partial',open:'○ Open'};
  return `<span class="st ${map[st]||'st-open'}">${label[st]||st}</span>`;
}
function priBadge(p) {
  if (!p) return '';
  return `<span class="pri ${p}">${p.toUpperCase()}</span>`;
}
function srcBadge(src) {
  return src === 'user'
    ? `<span class="src-user">USER</span>`
    : `<span class="src-claude">CLAUDE</span>`;
}

function renderAll(filterSrc, filterSt, filterPri, search) {
  const main = document.getElementById('main-content');
  let cntDone=0, cntProg=0, cntPart=0, cntOpen=0;
  let html = '';

  SESSIONS.forEach(sess => {
    let rows = '';
    let shown = 0;
    sess.items.forEach(item => {
      const srcMatch = !filterSrc || item.src === filterSrc;
      const stMatch  = !filterSt  || item.status === filterSt;
      const priMatch = !filterPri || item.pri === filterPri;
      const text = (item.ask+' '+item.detail+' '+(item.resp||'')).toLowerCase();
      const srchMatch = !search || text.includes(search.toLowerCase());
      const vis = srcMatch && stMatch && priMatch && srchMatch;
      if (!vis) return;
      shown++;
      if (item.status==='done') cntDone++;
      else if (item.status==='prog') cntProg++;
      else if (item.status==='partial') cntPart++;
      else cntOpen++;

      rows += `<tr class="item-row">
        <td class="col-num">#${item.id}</td>
        <td class="col-src">${srcBadge(item.src)}</td>
        <td class="col-ask">
          <div class="ask-title">${item.ask}${priBadge(item.pri)}</div>
          ${item.detail ? `<div class="ask-detail">${item.detail}</div>` : ''}
        </td>
        <td class="col-status">${statusBadge(item.status)}</td>
        <td class="col-resp">${item.resp||'—'}</td>
      </tr>`;
    });
    if (shown === 0) return;

    html += `<div class="session">
      <div class="session-hdr" onclick="this.parentElement.querySelector('.session-body').style.display=this.parentElement.querySelector('.session-body').style.display==='none'?'block':'none'">
        <span class="session-date">${sess.date}</span>
        <span class="session-count">${shown} items</span>
      </div>
      <div class="session-body">
        <table>
          <thead><tr>
            <th>#</th><th>Source</th><th>Ask / Item</th><th>Status</th><th>Response / Notes</th>
          </tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
    </div>`;
  });

  main.innerHTML = html || '<div style="padding:40px;text-align:center;color:var(--text3)">No items match filter.</div>';
  document.getElementById('cnt-done').textContent = cntDone;
  document.getElementById('cnt-prog').textContent  = cntProg;
  document.getElementById('cnt-part').textContent  = cntPart;
  document.getElementById('cnt-open').textContent  = cntOpen;
}

function applyFilters() {
  renderAll(
    document.getElementById('filter-src').value,
    document.getElementById('filter-status').value,
    document.getElementById('filter-pri').value,
    document.getElementById('filter-search').value.trim()
  );
}

document.getElementById('filter-src').addEventListener('change', applyFilters);
document.getElementById('filter-status').addEventListener('change', applyFilters);
document.getElementById('filter-pri').addEventListener('change', applyFilters);
document.getElementById('filter-search').addEventListener('input', applyFilters);

// ─────────────────────────────────────────────────────────────────────────────
// TAB SWITCHING
// ─────────────────────────────────────────────────────────────────────────────
function switchTab(name, btn) {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  btn.classList.add('active');
  if (name === 'captures') renderCaptures();
}

// ─────────────────────────────────────────────────────────────────────────────
// CAPTURES ENGINE
// ─────────────────────────────────────────────────────────────────────────────
const LS_KEY = 'eigenview_captures_v1';

function getUserCaptures() {
  try { return JSON.parse(localStorage.getItem(LS_KEY) || '[]'); }
  catch { return []; }
}
function saveUserCaptures(arr) {
  localStorage.setItem(LS_KEY, JSON.stringify(arr));
}

function allCaptures() {
  const user = getUserCaptures();
  // Merge Claude + User, sort by insertion order (Claude first by id, then user by timestamp)
  const claude = CLAUDE_CAPTURES.map((c,i) => ({...c, _order: i}));
  const merged = [
    ...claude.map(c => ({...c, _src:'claude'})),
    ...user.map((c,i) => ({...c, _src:'user', _order: claude.length + i}))
  ];
  return merged;
}

function seqNumber(idx) {
  return 'C' + (idx + 1);
}

function authorBadge(author) {
  return author === 'claude'
    ? `<span class="cap-author-claude">CLAUDE</span>`
    : `<span class="cap-author-user">USER</span>`;
}

function issueLinks(issues) {
  if (!issues || !issues.length) return '';
  return `<div class="cap-issues">${issues.map(i =>
    `<a class="cap-issue-link" onclick="jumpToIssue('${i}')">${i}</a>`
  ).join('')}</div>`;
}

function jumpToIssue(issueRef) {
  // Switch to issues tab, clear filters, search for issue number
  switchTab('issues', document.querySelectorAll('.tab-btn')[0]);
  const num = issueRef.replace('#','');
  document.getElementById('filter-search').value = '#' + num;
  applyFilters();
  // Scroll to top of issues
  document.getElementById('main-content').scrollIntoView({behavior:'smooth'});
}

function renderCaptureCard(cap, idx, deletable) {
  const num = seqNumber(idx);
  let bodyHtml = '';

  if (cap.type === 'table' && cap.table) {
    const hdrs = cap.table.headers.map(h => `<th>${h}</th>`).join('');
    const rows = cap.table.rows.map(r =>
      `<tr>${r.map(c => `<td>${c}</td>`).join('')}</tr>`
    ).join('');
    bodyHtml = `<table class="cap-table"><thead><tr>${hdrs}</tr></thead><tbody>${rows}</tbody></table>`;
  } else if (cap.type === 'image' && cap.dataUrl) {
    bodyHtml = `<img class="cap-image" src="${cap.dataUrl}" alt="${cap.title||'capture'}">`;
  } else if (cap.type === 'text' || cap.text) {
    bodyHtml = `<div class="cap-text">${(cap.text||cap.content||'').replace(/</g,'&lt;').replace(/>/g,'&gt;')}</div>`;
  } else if (cap.content) {
    bodyHtml = `<div class="cap-text">${cap.content.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</div>`;
  }

  const delBtn = deletable
    ? `<button class="cap-del" onclick="deleteUserCapture('${cap.id}')" title="Delete">✕</button>`
    : '';

  return `<div class="capture-card" id="capture-${cap.id}">
    <div class="capture-card-hdr">
      <span class="cap-num">${num}</span>
      ${authorBadge(cap.author||cap._src)}
      <span class="cap-type">${cap.type||'text'}</span>
      <span class="cap-title">${cap.title||'Untitled'}</span>
      ${issueLinks(cap.linked_issues||[])}
      <span class="cap-ts" style="margin-left:auto;margin-right:8px">${cap.timestamp||''}</span>
      ${delBtn}
    </div>
    <div class="capture-card-body">${bodyHtml}</div>
  </div>`;
}

function renderCaptures() {
  const caps = allCaptures();
  const list = document.getElementById('captures-list');
  if (!caps.length) {
    list.innerHTML = '<div style="padding:40px;text-align:center;color:var(--text3)">No captures yet. Paste something above.</div>';
  } else {
    list.innerHTML = caps.map((c,i) => renderCaptureCard(c, i, c._src === 'user')).join('');
  }
  document.getElementById('cap-count-badge').textContent = caps.length;
}

function deleteUserCapture(id) {
  const arr = getUserCaptures().filter(c => c.id !== id);
  saveUserCaptures(arr);
  renderCaptures();
}

// ─────────────────────────────────────────────────────────────────────────────
// PASTE ZONE
// ─────────────────────────────────────────────────────────────────────────────
const pasteZone = document.getElementById('paste-zone');
const pasteHint = document.getElementById('paste-hint');
let pendingDataUrl = null;
let pendingType = 'text';

pasteZone.addEventListener('input', () => {
  pasteHint.style.display = pasteZone.textContent.trim() || pasteZone.querySelector('img') ? 'none' : 'flex';
});

pasteZone.addEventListener('paste', (e) => {
  e.preventDefault();
  pasteHint.style.display = 'none';
  const items = e.clipboardData.items;

  // Check for image first
  for (const item of items) {
    if (item.type.startsWith('image/')) {
      const blob = item.getAsFile();
      const reader = new FileReader();
      reader.onload = (ev) => {
        pendingDataUrl = ev.target.result;
        pendingType = 'image';
        const img = document.createElement('img');
        img.src = pendingDataUrl;
        img.style.maxWidth = '100%';
        img.style.borderRadius = '4px';
        pasteZone.innerHTML = '';
        pasteZone.appendChild(img);
      };
      reader.readAsDataURL(blob);
      return;
    }
  }

  // Plain text / HTML
  const text = e.clipboardData.getData('text/plain') || e.clipboardData.getData('text/html') || '';
  pendingType = 'text';
  pendingDataUrl = null;
  pasteZone.textContent = text;
});

function saveCapture() {
  const title = document.getElementById('paste-title').value.trim() || 'User Capture';
  const issueRaw = document.getElementById('paste-issues').value.trim();
  const linked = issueRaw ? issueRaw.split(/[\s,]+/).filter(Boolean).map(s => s.startsWith('#') ? s : '#'+s) : [];
  const ts = new Date().toISOString().slice(0,10);
  const id = 'user-' + Date.now();

  let cap;
  if (pendingType === 'image' && pendingDataUrl) {
    cap = {id, author:'user', type:'image', title, linked_issues:linked, timestamp:ts, dataUrl:pendingDataUrl};
  } else {
    const text = pasteZone.textContent.trim();
    if (!text) { alert('Nothing to save — paste something first.'); return; }
    cap = {id, author:'user', type:'text', title, linked_issues:linked, timestamp:ts, text};
  }

  const arr = getUserCaptures();
  arr.push(cap);
  saveUserCaptures(arr);

  clearPasteZone();
  renderCaptures();

  // Scroll to new capture
  setTimeout(() => {
    const el = document.getElementById('capture-' + id);
    if (el) el.scrollIntoView({behavior:'smooth', block:'nearest'});
  }, 100);
}

function clearPasteZone() {
  pasteZone.innerHTML = '';
  pasteZone.textContent = '';
  pendingDataUrl = null;
  pendingType = 'text';
  pasteHint.style.display = 'flex';
  document.getElementById('paste-title').value = '';
  document.getElementById('paste-issues').value = '';
}

// ─────────────────────────────────────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────────────────────────────────────
renderAll('','','','');
document.getElementById('cap-count-badge').textContent = allCaptures().length;
</script>
</body>
</html>
