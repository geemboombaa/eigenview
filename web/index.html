<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>EigenView — Daily Options Intelligence</title>
  <link rel="stylesheet" href="css/themes.css"/>
  <link rel="stylesheet" href="css/components.css"/>
  <script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
</head>
<body>
<div id="ev-shell">
  <header id="ev-header">
    <div class="brand">
      <span class="brand-mark">Eigen<em>View</em></span>
      <span class="brand-tag">Options Intelligence</span>
    </div>
    <div class="header-center">
      <div class="search-wrap">
        <span class="search-icon">⌕</span>
        <input id="ev-search" type="text" placeholder="Search ticker… (Ctrl+K)" autocomplete="off"/>
      </div>
    </div>
    <div class="header-right">
      <span id="ev-scan-time" class="scan-badge">—</span>
      <button id="ev-scan-btn" class="btn" title="Run daily scan on SP500+NDX100 universe" data-universe="full" style="padding:4px 10px;font-size:11px;letter-spacing:0.5px;">SCAN</button>
      <button id="ev-scan-test-btn" class="btn" title="Quick scan: NVDA AAPL TSLA META AMD only" data-universe="test5" style="padding:4px 10px;font-size:10px;letter-spacing:0.5px;opacity:0.6;">SCAN·5</button>
      <button id="ev-help-btn" class="btn" title="Help & Signal Reference" onclick="document.getElementById('ev-help-overlay').hidden=false" style="padding:4px 10px;font-size:11px;letter-spacing:0.5px;">HELP</button>
      <div id="ev-tpl-switcher" class="tpl-switcher"></div>
      <div id="ev-theme-switcher" class="theme-switcher">
        <button class="theme-btn active" data-theme="dark">DARK</button>
        <button class="theme-btn" data-theme="light">LIGHT</button>
        <button class="theme-btn" data-theme="glass">GLASS</button>
        <button class="theme-btn" data-theme="bento">BENTO</button>
      </div>
    </div>
  </header>

  <div id="ev-subnav">
    <nav id="ev-nav-slot"></nav>
    <div id="ev-market-slot"></div>
  </div>

  <div id="ev-body">
    <div id="ev-picks-slot">
      <div id="ev-picks-content" class="left-tab-pane"></div>
      <div id="ev-matrix-content" class="left-tab-pane" style="display:none"></div>
      <div id="ev-mine-content" class="left-tab-pane" style="display:none"></div>
    </div>
    <div id="ev-main-col">
      <main id="ev-canvas" class="canvas">
        <div id="ev-module-palette" class="module-palette" hidden>
          <div class="palette-head">
            <span>Add Panel</span>
            <button id="ev-palette-close" class="btn btn-ghost">✕</button>
          </div>
          <div id="ev-palette-list"></div>
        </div>
      </main>
      <div id="ev-strip-slot"></div>
    </div>
    <aside id="ev-chat-slot" class="chat-slot"></aside>
  </div>
</div>

<div id="ev-edit-hint" class="edit-hint" hidden>
  <span><strong>EDIT MODE</strong> — drag panel headers to move · corner handle to resize · ✕ to close · <button class="btn btn-ghost" onclick="document.getElementById('ev-module-palette').hidden=false">+ Add Panel</button></span>
  <button id="ev-edit-done" class="btn btn-primary">Done</button>
</div>

<div id="ev-shortcuts-overlay" class="shortcuts-overlay" hidden>
  <div class="shortcuts-box">
    <div class="shortcuts-title">Keyboard Shortcuts</div>
    <div class="shortcuts-grid">
      <span class="key">Ctrl+K</span><span>Search</span>
      <span class="key">/</span><span>Focus chat</span>
      <span class="key">T</span><span>Cycle theme</span>
      <span class="key">E</span><span>Edit layout</span>
      <span class="key">1–5</span><span>Switch template</span>
      <span class="key">↑ ↓</span><span>Navigate picks</span>
      <span class="key">Esc</span><span>Close / clear</span>
      <span class="key">?</span><span>This overlay</span>
    </div>
    <button class="btn btn-ghost" onclick="document.getElementById('ev-shortcuts-overlay').hidden=true">Close</button>
  </div>
</div>

<script src="js/framework.js"></script>
<script src="js/templates.js"></script>
<script src="js/modules/market-context.js"></script>
<script src="js/modules/category-nav.js"></script>
<script src="js/modules/pick-cards.js"></script>
<script src="js/modules/factor-pulse.js"></script>
<script src="js/modules/price-chart.js"></script>
<script src="js/modules/factor-strip.js"></script>
<script src="js/modules/ai-chat.js"></script>
<script src="js/modules/voice-orb.js"></script>
<script src="js/modules/help-page.js"></script>
<script src="js/app.js"></script>
</body>
</html>
